<head>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>Patoche Vinyl</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0e0e0e;color:#e8e8e0;font-family:Georgia,serif;min-height:100vh;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:72px}

/* Header */
.header{padding:16px 18px 12px;border-bottom:1px solid #222;display:flex;align-items:center;gap:14px;background:#0e0e0e;position:sticky;top:0;z-index:50}
.header-title{font-size:18px;font-weight:900;color:#e8c84a;letter-spacing:3px}
.header-sub{font-size:11px;color:#555;margin-top:2px;font-family:monospace}

/* Nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:#0a0a0a;border-top:1px solid #222;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:10px 0;background:none;border:none;color:#555;cursor:pointer;font-size:10px;font-family:Georgia,serif;transition:color .2s}
nav button.active{color:#e8c84a}
.nav-icon{font-size:22px;display:block;margin-bottom:2px}

/* Section */
.section{padding:20px 16px;flex:1}

/* Boutons */
.btn{width:100%;padding:14px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:Georgia,serif;transition:all .15s;border:none;display:block;text-align:center}
.btn+.btn{margin-top:10px}
.btn-gold{background:#e8c84a;color:#111}
.btn-gold:active{background:#c9a832}
.btn-outline{background:transparent;border:1.5px solid #e8c84a;color:#e8c84a}
.btn-outline:active{background:#e8c84a11}
.btn-danger{background:transparent;border:1.5px solid #5a2020;color:#c06060}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* Ecran clé API */
.setup-wrap{padding:32px 20px;text-align:center}
.setup-icon{font-size:56px;margin-bottom:20px}
.setup-title{color:#e8c84a;font-size:22px;font-weight:700;margin-bottom:8px}
.setup-sub{color:#666;font-size:13px;line-height:1.7;margin-bottom:28px;font-family:monospace}
.setup-input{width:100%;padding:14px 16px;background:#1a1a1a;border:1.5px solid #333;border-radius:12px;color:#e8e8e0;font-size:14px;font-family:monospace;outline:none;margin-bottom:8px;-webkit-appearance:none}
.setup-input:focus{border-color:#e8c84a}
.setup-hint{color:#444;font-size:11px;font-family:monospace;margin-bottom:20px;text-align:left}
.setup-link{color:#e8c84a;font-size:12px;margin-top:16px;display:block}

/* Mode cards */
.mode-card{width:100%;padding:18px 20px;margin-bottom:12px;background:#191919;border:1px solid #2a2a2a;border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:16px;text-align:left;transition:border-color .2s}
.mode-card:active{border-color:#e8c84a}
.mode-icon{font-size:32px;flex-shrink:0}
.mode-title{color:#e8c84a;font-weight:700;font-size:16px}
.mode-sub{color:#555;font-size:12px;margin-top:3px;font-family:monospace}

/* Caméra */
#video{width:100%;max-height:60vh;object-fit:cover;display:block}
.viewfinder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.vf-pochette{width:210px;height:210px;border:2px solid #e8c84a;border-radius:10px;box-shadow:0 0 0 2000px rgba(0,0,0,.45)}
.vf-barcode{width:78%;height:72px;border:2px solid #e8c84a;border-radius:6px;box-shadow:0 0 0 2000px rgba(0,0,0,.45);position:relative}
.vf-scan-line{position:absolute;left:0;right:0;top:50%;height:2px;background:#e8c84a;animation:scanline 2s ease-in-out infinite;opacity:.7}
@keyframes scanline{0%,100%{opacity:.2}50%{opacity:.9}}
.cam-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px 16px 20px;background:linear-gradient(transparent,rgba(0,0,0,.92))}
.cam-hint{color:#aaa;font-size:12px;text-align:center;margin-bottom:12px;font-family:monospace}
.cam-btns{display:flex;gap:10px}
.cam-btns .btn{flex:1}
.flash{position:absolute;inset:0;background:#fff;opacity:.85;z-index:20;pointer-events:none}

/* Spinner */
.spinner-wrap{padding:48px;text-align:center}
.spinner{width:56px;height:56px;border-radius:50%;border:3px solid #222;border-top-color:#e8c84a;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-msg{color:#e8c84a;margin-top:18px;font-size:15px}
.spinner-sub{color:#555;font-size:12px;margin-top:4px;font-family:monospace}

/* Résultat */
.result-card{background:#191919;border:1px solid #2a2a2a;border-radius:14px;padding:18px;margin-bottom:14px}
.result-head{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.result-artist{color:#e8c84a;font-weight:700;font-size:17px}
.result-title{color:#ccc;font-size:15px;margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{background:#252525;color:#777;border-radius:6px;padding:3px 9px;font-size:11px;font-family:monospace}
.conf-badge{border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;font-family:monospace}
.conf-haute{background:#5dba7a22;color:#5dba7a}
.conf-moyenne{background:#e8c84a22;color:#e8c84a}
.conf-faible{background:#c0606022;color:#c06060}
.note-txt{color:#555;font-size:11px;margin-top:8px;font-style:italic}

/* Liste */
.record-card{background:#191919;border:1px solid #2a2a2a;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.record-card:active{border-color:#e8c84a44}
.record-head{display:flex;align-items:center;gap:10px}
.record-artist{color:#e8c84a;font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-title{color:#bbb;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-meta{font-size:11px;color:#555;margin-top:2px;font-family:monospace}
.record-body{margin-top:10px;padding-top:10px;border-top:1px solid #252525}
.detail-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.detail-key{color:#555;font-family:monospace}
.detail-val{color:#ccc}

/* Recherche */
.search-input{width:100%;padding:12px 14px;background:#191919;border:1px solid #2a2a2a;border-radius:10px;color:#e8e8e0;font-size:15px;font-family:Georgia,serif;outline:none;margin-bottom:14px;-webkit-appearance:none}
.search-input:focus{border-color:#e8c84a44}

/* Empty */
.empty{text-align:center;padding-top:60px;color:#333}
.empty p{margin-top:16px;font-size:14px;line-height:1.6}

/* Export */
.stats-box{background:#191919;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:18px}
.stat-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
.stat-val{color:#e8c84a;font-weight:700;font-family:monospace}
.prompt-box{margin-top:20px;padding:16px;background:#141414;border:1px solid #222;border-radius:12px}
.prompt-label{color:#e8c84a;font-size:13px;margin-bottom:8px}
.prompt-text{color:#777;font-size:12px;line-height:1.8;font-style:italic}

/* Toast */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;background:#1a2a1a;border:1px solid #3a6a3a;border-radius:10px;padding:10px 18px;color:#5dba7a;font-size:13px;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.7);font-family:monospace;animation:toastin .2s ease}
@keyframes toastin{from{opacity:0;top:0}to{opacity:1;top:14px}}

/* Erreur */
.error-box{background:#1a0000;border:1px solid #500;border-radius:12px;padding:24px;text-align:center;margin:20px 0}
.error-icon{font-size:36px;margin-bottom:12px}
.error-msg{color:#c06060;font-size:14px;margin-bottom:16px;line-height:1.6;font-family:monospace}

/* Vinyl SVG */
@keyframes vinylspin{to{transform:rotate(360deg)}}
</style>
</head>

var _sv = localStorage.getItem('pv-col');
var collection = (_sv && _sv.length > 2) ? JSON.parse(_sv) : [];
var apiKey = localStorage.getItem('pv-key') || '';
var currentView = 'scan';
var camStream = null;
var camZoom = 1; var camZoomMin = 1; var camZoomMax = 5; var camZoomStep = 0.5;

function save() {
  localStorage.setItem('pv-col', JSON.stringify(collection));
  document.getElementById('hcount').textContent = collection.length + ' disque' + (collection.length !== 1 ? 's' : '') + ' · collection locale';
  document.getElementById('nav-count').textContent = collection.length ? ' (' + collection.length + ')' : '';
}

// ── SVG Vinyl ──────────────────────────────────────────────────────────
function disc(size, spin) {
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 100 100" style="' + (spin ? 'animation:vinylspin 1.8s linear infinite' : '') + '">' +
    '<circle cx="50" cy="50" r="48" fill="#1c1c1c" stroke="#3a3a3a" stroke-width="1.5"/>' +
    '<circle cx="50" cy="50" r="40" fill="none" stroke="#242424" stroke-width=".8"/>' +
    '<circle cx="50" cy="50" r="30" fill="none" stroke="#242424" stroke-width=".8"/>' +
    '<circle cx="50" cy="50" r="20" fill="none" stroke="#242424" stroke-width=".8"/>' +
    '<circle cx="50" cy="50" r="11" fill="#e8c84a" stroke="#c9a832" stroke-width="1"/>' +
    '<circle cx="50" cy="50" r="4" fill="#1c1c1c"/></svg>';
}

// ── Toast ──────────────────────────────────────────────────────────────
function toast(msg) {
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function() { el.remove(); }, 2500);
}

// ── Navigation ─────────────────────────────────────────────────────────
function setView(v) {
  stopCam();
  currentView = v;
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('nav-' + v).classList.add('active');
  render();
}

function render() {
  if (!apiKey) { renderSetup(); return; }
  if (currentView === 'scan') renderScan();
  else if (currentView === 'list') renderList();
  else renderExport();
}

// ── ÉCRAN CLÉ API ──────────────────────────────────────────────────────
function renderSetup() {
  document.getElementById('main').innerHTML =
    '<div class="setup-wrap">' +
    '<div class="setup-icon">🔑</div>' +
    '<div class="setup-title">Clé API Anthropic</div>' +
    '<div class="setup-sub">Pour analyser tes pochettes avec Claude,<br>entre ta clé API une seule fois.<br>Elle sera sauvegardée sur ton iPhone.</div>' +
    '<input class="setup-input" type="text" id="key-input" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>' +
    '<div class="setup-hint">→ Trouve ta clé sur console.anthropic.com<br>→ Menu : API Keys → Create Key</div>' +
    '<button class="btn btn-gold" onclick="saveKey()">✓ Enregistrer la clé</button>' +
    '<a class="setup-link" href="https://console.anthropic.com" target="_blank">Ouvrir console.anthropic.com →</a>' +
    '</div>';
}

function saveKey() {
  var val = document.getElementById('key-input').value.trim();
  if (!val || !val.startsWith('sk-')) {
    toast('⚠️ Clé invalide — doit commencer par sk-');
    return;
  }
  apiKey = val;
  localStorage.setItem('pv-key', apiKey);
  toast('✅ Clé enregistrée !');
  render();
}

// ── SCANNER ────────────────────────────────────────────────────────────
function renderScan() {
  document.getElementById('main').innerHTML =
    '<div class="section">' +
    '<div style="text-align:center;margin-bottom:28px;padding-top:8px">' + disc(60, false) +

    '<div class="mode-sub">Pointe la caméra sur la couverture du disque</div></div></button>' +
    '<button class="mode-card" onclick="startCam(\'barcode\')">' +
    '<span class="mode-icon">▌▌▌</span><div><div class="mode-title">Code-barre EAN</div>' +
    '<div class="mode-sub">Pointe sur le code-barre au dos de la pochette</div></div></button>' +
    '<button class="btn btn-outline" style="margin-top:8px" onclick="changeKey()">⚙️ Changer la clé API</button>' +
    '</div>';
}

function changeKey() {
  apiKey = '';
  localStorage.removeItem('pv-key');
  render();
}

async function startCam(hint) {
  var isBarcode = hint === 'barcode';
  document.getElementById('main').innerHTML =
    '<div style="position:relative;background:#000">' +
    '<video id="video" playsinline muted style="width:100%;max-height:62vh;object-fit:cover;display:block"></video>' +
    '<div class="viewfinder">' +
    (isBarcode
      ? '<div class="vf-barcode"><div class="vf-scan-line"></div></div>'
      : '<div class="vf-pochette"></div>') +
    '</div>' +
    '<div id="flash" style="display:none" class="flash"></div>' +
    '<div class="cam-overlay">' +
    '<p class="cam-hint">' + (isBarcode ? 'Centre le code-barre dans le cadre' : 'Cadre la pochette dans le carré') + '</p>' +
    '<div id="zoom-controls" style="display:none;justify-content:center;align-items:center;gap:14px;margin-bottom:10px">' +
    '<button class="btn btn-outline" style="flex:none;width:44px;height:44px;padding:0;font-size:22px;border-radius:50%" onclick="adjustZoom(-1)">−</button>' +
    '<span id="zoom-val" style="color:#e8c84a;font-family:monospace;font-size:14px;min-width:36px;text-align:center">1×</span>' +
    '<button class="btn btn-outline" style="flex:none;width:44px;height:44px;padding:0;font-size:22px;border-radius:50%" onclick="adjustZoom(1)">+</button>' +
    '</div>' +
    '<div class="cam-btns">' +
    '<button class="btn btn-outline" onclick="setView(\'scan\')">✕ Annuler</button>' +
    '<button class="btn btn-gold" id="capbtn" onclick="doCapture(\'' + hint + '\')" disabled>📷 Capturer</button>' +
    '</div></div></div>';

  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    var v = document.getElementById('video');
    v.srcObject = camStream;
    await v.play();
    var track = camStream.getVideoTracks()[0];
    var caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.zoom) {
      camZoomMin = caps.zoom.min; camZoomMax = caps.zoom.max;
      camZoomStep = Math.max(caps.zoom.step || 0.1, 0.1);
      camZoom = caps.zoom.min;
      track.applyConstraints({ advanced: [{ zoom: camZoom }] }).catch(function(){});
      var zc = document.getElementById('zoom-controls');
      if (zc) zc.style.display = 'flex';
      var zv = document.getElementById('zoom-val');
      if (zv) zv.textContent = camZoom.toFixed(1) + '×';
    }
    var btn = document.getElementById('capbtn');
    if (btn) btn.disabled = false;
  } catch(e) {
    document.getElementById('main').innerHTML =
      '<div class="section"><div class="error-box">' +
      '<div class="error-icon">📷</div>' +
      '<div class="error-msg">' + (e.name === 'NotAllowedError'
        ? 'Accès caméra refusé.<br>Réglages iPhone → Safari → Caméra → Autoriser'
        : 'Caméra inaccessible : ' + e.message) + '</div>' +
      '<button class="btn btn-outline" onclick="setView(\'scan\')">Retour</button>' +
      '</div></div>';
  }
}

function adjustZoom(dir) {
  if (!camStream) return;
  var track = camStream.getVideoTracks()[0];
  camZoom = Math.max(camZoomMin, Math.min(camZoomMax, camZoom + dir * camZoomStep));
  track.applyConstraints({ advanced: [{ zoom: camZoom }] }).catch(function(){});
  var zv = document.getElementById('zoom-val');
  if (zv) zv.textContent = camZoom.toFixed(1) + '×';
}

function stopCam() {
  if (camStream) { camStream.getTracks().forEach(function(t) { t.stop(); }); camStream = null; }
}

async function doCapture(hint) {
  var flash = document.getElementById('flash');
  if (flash) flash.style.display = 'block';
  await new Promise(function(r) { setTimeout(r, 100); });

  var v = document.getElementById('video');
  var maxDim = 1200;
  var scale = Math.min(1, maxDim / Math.max(v.videoWidth, v.videoHeight));
  var c = document.createElement('canvas');
  c.width = Math.round(v.videoWidth * scale);
  c.height = Math.round(v.videoHeight * scale);
  c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
  var b64 = c.toDataURL('image/jpeg', 0.88).split(',')[1];
  c.width = 0; c.height = 0;

  stopCam();

  document.getElementById('main').innerHTML =
    '<div class="spinner-wrap">' + disc(64, true) +
    '<p class="spinner-msg">Claude analyse l\'image…</p>' +
    '<p class="spinner-sub">Photo analysée puis effacée de la mémoire</p></div>';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 800,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: 'Expert vinyle. ' + (hint === 'barcode'
              ? 'Lis le code-barre EAN/UPC et identifie le disque.'
              : 'Identifie ce disque depuis sa pochette.') +
              '\nRéponds UNIQUEMENT en JSON valide sans markdown :\n{"artiste":"","titre":"","annee":"","label":"","genre":"","style":"","format":"LP","pays":"","bpm":"","tonalite":"","confiance":"haute|moyenne|faible","note":""}' }
          ]
        }]
      })
    });
    var d = await res.json();
    if (d.error) throw new Error(d.error.message);
    var txt = (d.content && d.content[0] ? d.content[0].text : '').replace(/```json|```/g, '').trim();
    var meta = JSON.parse(txt);
    meta._uid = Date.now() + '-' + Math.random();
    showResult(meta);
  } catch(e) {

      '<div class="section"><div class="error-box">' +

      '<div class="error-msg">' + e.message + '</div>' +

// ── CAMELOT + MATCHING ─────────────────────────────────────────────────
var CAMELOT = {
  'C':'8B','Do':'8B','G':'9B','Sol':'9B','D':'10B','Ré':'10B','Re':'10B',
  'A':'11B','La':'11B','E':'12B','Mi':'12B','B':'1B','Si':'1B',
  'F#':'2B','Gb':'2B','Fa#':'2B','Db':'3B','C#':'3B','Ab':'4B','G#':'4B',
  'Eb':'5B','D#':'5B','Mib':'5B','Bb':'6B','A#':'6B','Sib':'6B','F':'7B','Fa':'7B',
  'Am':'8A','Lam':'8A','Em':'9A','Mim':'9A','Bm':'10A','Sim':'10A',
  'F#m':'11A','Fa#m':'11A','C#m':'12A','G#m':'1A','Labm':'1A',
  'Ebm':'2A','D#m':'2A','Bbm':'3A','A#m':'3A','Fm':'4A','Fam':'4A',
  'Cm':'5A','Dom':'5A','Gm':'6A','Solm':'6A','Dm':'7A','Rém':'7A','Rem':'7A'
};

function camelotKey(t) {
  if (!t) return null;
  t = t.trim();
  if (/^\d{1,2}[AB]$/i.test(t)) return t.toUpperCase();
  if (CAMELOT[t]) return CAMELOT[t];
  for (var k in CAMELOT) { if (k.toLowerCase() === t.toLowerCase()) return CAMELOT[k]; }
  return null;
}

function camelotCompat(k1, k2) {
  if (!k1 || !k2) return false;
  var n1 = parseInt(k1), l1 = k1.slice(-1), n2 = parseInt(k2), l2 = k2.slice(-1);
  if (n1 === n2 && l1 === l2) return true;
  if (n1 === n2) return true;
  return l1 === l2 && ((n2 - n1 + 12) % 12 === 1 || (n1 - n2 + 12) % 12 === 1);
}

function bpmCompat(b1, b2) {
  var f1 = parseFloat(b1), f2 = parseFloat(b2);
  if (!f1 || !f2) return false;
  var r = f1 / f2;
  return (r >= 0.95 && r <= 1.05) || (r >= 1.90 && r <= 2.10) || (r >= 0.475 && r <= 0.525);
}

function scoreMatch(src, tgt) {
  var s = 0;
  if (camelotCompat(camelotKey(src.tonalite), camelotKey(tgt.tonalite))) s += 3;
  if (bpmCompat(src.bpm, tgt.bpm)) s += 3;
  if (src.genre && tgt.genre && src.genre.toLowerCase() === tgt.genre.toLowerCase()) s += 2;
  if (src.style && tgt.style && src.style.toLowerCase() === tgt.style.toLowerCase()) s += 1;
  return s;
}

// ── ENCHAÎNEMENTS ──────────────────────────────────────────────────────
function renderChain(uid) {
  var src = collection.find(function(x) { return x._uid === uid; });
  if (!src) return;
  var hasBpm = src.bpm && parseFloat(src.bpm) > 0;
  var hasTon = !!src.tonalite;
  var ck = camelotKey(src.tonalite);
  document.getElementById('main').innerHTML =
    '<div class="section">' +
    '<button class="btn btn-outline" style="margin-bottom:16px" onclick="setView(\'list\')">← Mes Albums</button>' +
    '<h2 style="color:#e8c84a;margin-bottom:4px;font-size:16px">🎚️ Enchaînements</h2>' +
    '<p style="color:#555;font-size:12px;font-family:monospace;margin-bottom:16px">' + (src.artiste || '?') + ' — ' + (src.titre || '') +
    (hasBpm ? ' · ' + src.bpm + ' BPM' : '') + (ck ? ' · ' + ck : '') + '</p>' +
    (!hasBpm || !hasTon ? '<div class="error-box" style="background:#1a1500;border-color:#5a4500;margin-bottom:16px">' +
    '<div class="error-msg" style="color:#c8a840;font-size:12px">BPM ou tonalité manquants — résultats basés sur le style uniquement.<br>Complète via Claude pour de meilleurs enchaînements.</div>' +
    '<button class="btn btn-gold" style="margin-top:10px" onclick="fetchBpmTon(\'' + uid + '\')">Compléter via Claude</button>' +
    '</div>' : '') +
    '<div id="chain-list"></div></div>';

  var scored = collection.filter(function(x) { return x._uid !== uid; })
    .map(function(r) { return { r: r, s: scoreMatch(src, r) }; })
    .filter(function(x) { return x.s > 0; })
    .sort(function(a, b) { return b.s - a.s; })
    .slice(0, 12);

  var el = document.getElementById('chain-list');
  if (!el) return;
  if (!scored.length) {
    el.innerHTML = '<div class="empty">' + disc(48, false) + '<p>Aucun enchaînement trouvé.<br>Complète les BPM et tonalités de ta collection.</p></div>';
    return;
  }
  el.innerHTML = scored.map(function(x, i) {
    var r = x.r;
    var bOk = bpmCompat(src.bpm, r.bpm);
    var tOk = camelotCompat(camelotKey(src.tonalite), camelotKey(r.tonalite));
    var rck = camelotKey(r.tonalite);
    return '<div class="record-card">' +
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">' +
      '<span style="color:#555;font-family:monospace;font-size:11px">' + (i+1) + '.</span>' +
      (tOk ? '<span class="tag" style="background:#1a1a2a;color:#8080e8">Camelot ✓</span>' : '') +
      (bOk ? '<span class="tag" style="background:#1a2a1a;color:#5dba7a">BPM ✓</span>' : '') +
      '</div>' +
      '<div class="record-artist">' + (r.artiste || '?') + '</div>' +
      '<div class="record-title">' + (r.titre || '') + '</div>' +
      '<div class="record-meta">' + [r.bpm ? r.bpm + ' BPM' : null, rck, r.genre].filter(Boolean).join(' · ') + '</div>' +
      '</div>';
  }).join('');
}

async function fetchBpmTon(uid) {
  var r = collection.find(function(x) { return x._uid === uid; });
  if (!r) return;
  var btn = document.querySelector('#chain-list ~ div button, .error-box button');
  if (btn) { btn.disabled = true; btn.textContent = 'Analyse en cours…'; }
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 150,
        messages: [{ role: 'user', content: 'Disque : ' + r.artiste + ' — ' + r.titre + ' (' + [r.annee, r.genre, r.pays].filter(Boolean).join(', ') + '). BPM moyen et tonalité principale. JSON uniquement : {"bpm":"120","tonalite":"Am"}' }]
      })
    });
    var d = await res.json();
    if (d.error) throw new Error(d.error.message);

    toast('✅ BPM et tonalité mis à jour !');
    renderChain(uid);
  } catch(e) { toast('⚠️ ' + e.message); }
}

async function shareJSON() {
  var clean = collection.map(function(r) { var o = Object.assign({}, r); delete o._uid; return o; });
  var json = JSON.stringify(clean, null, 2);
  var file = new File([json], 'patoche_collection_vinyle.json', { type: 'application/json' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'Patoche Vinyl — Collection' });
    } catch(e) {
      if (e.name !== 'AbortError') toast('⚠️ Partage échoué : ' + e.message);
    }
  } else if (navigator.share) {
    try {
      await navigator.share({ title: 'Patoche Vinyl', text: json });
    } catch(e) {
      if (e.name !== 'AbortError') toast('⚠️ Partage échoué : ' + e.message);
    }
  } else {
    toast('⚠️ Partage non supporté — utilise Télécharger');
  }
}

function exportJSON() {
  var clean = collection.map(function(r) { var o = Object.assign({}, r); delete o._uid; return o; });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(clean, null, 2)], { type: 'application/json' }));
  a.download = 'patoche_collection_vinyle.json';
  a.click();
}

    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
      collection = data.map(function(r, i) {
        return Object.assign({}, r, {_uid: r._uid || ('e' + i)});
      });
      save();
      render();
    })
    .catch(function() { render(); });
} else {
  render();
}
</script>
</body>
